<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>orderkit demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #090909;
      color: #e5e5e5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 60px 20px;
      min-height: 100vh;
    }
    .demo-container {
      display: flex;
      gap: 40px;
      max-width: 1200px;
      margin: 0 auto;
      align-items: flex-start;
    }
    .demo-sidebar {
      display: flex;
      flex-direction: column;
      gap: 24px;
      min-width: 180px;
      position: sticky;
      top: 60px;
    }
    .demo-main {
      flex: 1;
      min-width: 0;
    }
    h1 {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #737373;
    }
    .demo-section {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .demo-label {
      font-size: 12px;
      color: #525252;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    button {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      color: #a3a3a3;
      padding: 6px 14px;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
      transition: border-color 150ms;
    }
    button:hover {
      border-color: #404040;
      color: #e5e5e5;
    }
    button.active {
      border-color: #525252;
      color: #e5e5e5;
      background: #222;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./main.tsx"></script>
</body>
</html>
